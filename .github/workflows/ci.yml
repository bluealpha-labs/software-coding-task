name: CI

on:
    push:
        branches: [main, dev]
    pull_request:
        branches: [main, dev]

jobs:
    test:
        runs-on: ubuntu-latest

        services:
            postgres:
                image: postgres:16.4
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: password
                    POSTGRES_DB: test_local
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
                ports:
                    - 5432:5432

            redis:
                image: redis:7-alpine
                options: >-
                    --health-cmd "redis-cli ping"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
                ports:
                    - 6379:6379

        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Setup Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.12"

            - name: Install pnpm
              uses: pnpm/action-setup@v2
              with:
                  version: 8

            - name: Get pnpm store directory
              shell: bash
              run: |
                  echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

            - name: Setup pnpm cache
              uses: actions/cache@v4
              with:
                  path: ${{ env.STORE_PATH }}
                  key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/package.json') }}
                  restore-keys: |
                      ${{ runner.os }}-pnpm-store-

            - name: Cache node_modules
              uses: actions/cache@v4
              with:
                  path: |
                      node_modules
                      apps/web/node_modules
                      apps/api/node_modules
                      packages/*/node_modules
                  key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package.json') }}
                  restore-keys: |
                      ${{ runner.os }}-node-modules-

            - name: Install uv
              run: |
                  curl -LsSf https://astral.sh/uv/install.sh | sh
                  echo "$HOME/.cargo/bin" >> $GITHUB_PATH

            - name: Install dependencies
              run: pnpm install --no-frozen-lockfile

            - name: Cache Python dependencies
              uses: actions/cache@v4
              with:
                  path: |
                      apps/api/.venv
                      ~/.cache/uv
                  key: ${{ runner.os }}-python-deps-${{ hashFiles('apps/api/pyproject.toml', 'apps/api/uv.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-python-deps-

            - name: Install Python dependencies
              run: |
                  cd apps/api
                  uv sync --extra test

            - name: Run database migrations
              run: |
                  cd apps/api && uv run python run_migration.py
              env:
                  POSTGRES_HOST: localhost
                  POSTGRES_PORT: 5432
                  POSTGRES_USER: postgres
                  POSTGRES_PASSWORD: password
                  POSTGRES_DB: test_local
              continue-on-error: true

            - name: Run API tests
              run: |
                  cd apps/api
                  uv run pytest tests/ -v --cov=api --cov-report=xml
              env:
                  POSTGRES_HOST: localhost
                  POSTGRES_PORT: 5432
                  POSTGRES_USER: postgres
                  POSTGRES_PASSWORD: password
                  POSTGRES_DB: test_local
                  REDIS_HOST: localhost
                  REDIS_PORT: 6379
              continue-on-error: true

            - name: Cache Playwright browsers
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cache/ms-playwright
                      apps/web/node_modules/@playwright/test
                  key: ${{ runner.os }}-playwright-${{ hashFiles('apps/web/package.json') }}
                  restore-keys: |
                      ${{ runner.os }}-playwright-

            - name: Install Playwright browsers
              run: |
                  cd apps/web
                  # Only install if browsers are not cached
                  if [ ! -d ~/.cache/ms-playwright ]; then
                      pnpm exec playwright install --with-deps
                  else
                      echo "Playwright browsers already cached, skipping installation"
                  fi

            - name: Run frontend tests
              run: |
                  cd apps/web
                  pnpm test
              continue-on-error: true

            - name: Run frontend typecheck
              run: |
                  cd apps/web
                  pnpm typecheck
              continue-on-error: true

            - name: Run frontend lint
              run: |
                  cd apps/web
                  pnpm lint
              continue-on-error: true

            - name: Build frontend
              run: |
                  cd apps/web
                  pnpm build
              continue-on-error: true

            - name: Upload coverage reports
              uses: codecov/codecov-action@v3
              with:
                  files: ./apps/api/coverage.xml
                  flags: api
                  name: api-coverage
              continue-on-error: true

    security:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Run Trivy vulnerability scanner
              uses: aquasecurity/trivy-action@master
              with:
                  scan-type: "fs"
                  scan-ref: "."
                  format: "sarif"
                  output: "trivy-results.sarif"

            - name: Upload Trivy scan results
              uses: github/codeql-action/upload-sarif@v3
              with:
                  sarif_file: "trivy-results.sarif"
              continue-on-error: true
